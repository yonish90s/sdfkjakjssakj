name: Fetch Articles Daily

# Every day at 02:00 UTC = 05:00 Israel time (Asia/Jerusalem)
# Can also be run manually from the "Run workflow" button
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── English articles (Python scraper) ────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agent/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Run English article scraper
        run: python agent/scrape_articles.py

      # ── Hebrew stock articles (Node.js agent) ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Hebrew stock news agent
        run: node agent/hebrew_stock_agent.js

      # ── Commit everything ────────────────────────────────────────────────
      - name: Commit updated articles (if changed)
        run: |
          git config user.name  "article-agent[bot]"
          git config user.email "article-agent@users.noreply.github.com"
          git add articles.json
          git add -f agent/.seen.json 2>/dev/null || true
          git add -f agent/.seen_hebrew.json 2>/dev/null || true
          git add articles/
          if git diff --cached --quiet; then
            echo "No new articles - nothing to commit."
          else
            git commit -m "chore: update articles ($(date -u +%Y-%m-%d))"
            git push
          fi
