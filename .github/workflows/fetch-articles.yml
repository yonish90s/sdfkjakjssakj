name: Fetch Articles Daily

# כל יום ב-02:00 UTC (~05:00 שעון ישראל בקיץ / 04:00 בחורף)
# אפשר גם להריץ ידנית מכפתור "Run workflow"
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agent/requirements.txt"

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run article scraper
        run: python agent/scrape_articles.py

      - name: Commit updated articles.json (if changed)
        run: |
          git config user.name  "article-agent[bot]"
          git config user.email "article-agent@users.noreply.github.com"
                    git add articles.json && git add -f agent/.seen.json
          if git diff --cached --quiet; then
            echo "No new articles - nothing to commit."
          else
            git commit -m "chore: update articles ($(date -u +%Y-%m-%d))"
            git push
          fi
