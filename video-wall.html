<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOKI — קיר וידאו חי</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050508;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f5f5f7;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(8,8,12,0.45);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    header h1 { font-size: 1.15rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    header h1 .crown { color: #f59e0b; }
    header a {
      color: #a1a1a6;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.15s;
    }
    header a:hover { color: #fff; }

    .wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
      padding: 20px;
      max-width: 1500px;
      margin: 0 auto;
    }
    .tile {
      position: relative;
      aspect-ratio: 16/9;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), box-shadow 0.35s ease, border-color 0.2s;
      opacity: 0;
      transform: translateY(20px);
      animation: tile-in 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .tile:nth-child(1) { animation-delay: 0.05s; }
    .tile:nth-child(2) { animation-delay: 0.12s; }
    .tile:nth-child(3) { animation-delay: 0.19s; }
    .tile:nth-child(4) { animation-delay: 0.26s; }
    .tile:nth-child(5) { animation-delay: 0.33s; }
    .tile:nth-child(6) { animation-delay: 0.40s; }
    .tile:nth-child(7) { animation-delay: 0.47s; }
    .tile:nth-child(8) { animation-delay: 0.54s; }
    @keyframes tile-in {
      to { opacity: 1; transform: translateY(0); }
    }
    .tile:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border-color: rgba(245,158,11,0.45);
    }
    .tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tile .label {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 26px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      font-size: 0.88rem;
      font-weight: 700;
      pointer-events: none;
    }
    .tile .live-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(239,68,68,0.92);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: none;
    }
    .live-badge .dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: live-pulse 1.4s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    /* fullscreen lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      padding: 4vmin;
    }
    #lightbox.open { display: flex; }
    #lightbox video {
      max-width: 100%;
      max-height: 100%;
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }
    #lightbox .close {
      position: absolute;
      top: 18px;
      left: 24px;
      font-size: 2rem;
      color: #86868b;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    #lightbox .close:hover { color: #fff; }

    @media (prefers-reduced-motion: reduce) {
      .tile { animation: none; opacity: 1; transform: none; }
      .live-badge .dot { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <h1><span class="crown">👑</span> SOKI — קיר וידאו חי</h1>
  <a href="/" onclick="if (window.opener) { window.close(); return false; }">→ חזרה לאתר</a>
</header>

<div class="wall" id="wall"></div>

<div id="lightbox" onclick="closeLightbox()">
  <button class="close" onclick="closeLightbox()">&times;</button>
  <video id="lightbox-video" controls autoplay muted loop playsinline></video>
</div>

<script>
const FEEDS = [
  { src: 'https://videos.pexels.com/video-files/853889/853889-hd_1920_1080_25fps.mp4',   label: 'מרכז העיר — שידור חי' },
  { src: 'https://videos.pexels.com/video-files/2611250/2611250-hd_1920_1080_30fps.mp4', label: 'קו הרקיע בלילה' },
  { src: 'https://videos.pexels.com/video-files/1739010/1739010-hd_1920_1080_30fps.mp4', label: 'תנועה בכבישים' },
  { src: 'https://videos.pexels.com/video-files/3130284/3130284-hd_1920_1080_30fps.mp4', label: 'נוף אווירי' },
  { src: 'https://videos.pexels.com/video-files/1572321/1572321-hd_1920_1080_24fps.mp4', label: 'שעת עומס' },
  { src: 'https://videos.pexels.com/video-files/3571264/3571264-hd_1920_1080_30fps.mp4', label: 'חוף הים' },
  { src: 'https://videos.pexels.com/video-files/2099568/2099568-hd_1920_1080_30fps.mp4', label: 'אורות העיר' },
  { src: 'https://videos.pexels.com/video-files/1093662/1093662-hd_1920_1080_30fps.mp4', label: 'טבע בתנועה' }
];

const wall = document.getElementById('wall');
FEEDS.forEach(feed => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML = `
    <video muted loop playsinline preload="metadata"></video>
    <div class="live-badge"><span class="dot"></span> LIVE</div>
    <div class="label">${feed.label}</div>`;
  const v = tile.querySelector('video');
  v.src = feed.src;
  v.addEventListener('canplay', () => v.play().catch(() => {}));
  v.addEventListener('error', () => tile.remove());
  tile.addEventListener('click', () => openLightbox(feed.src));
  wall.appendChild(tile);
});

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const v = document.getElementById('lightbox-video');
  v.src = src;
  lb.classList.add('open');
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  const v = document.getElementById('lightbox-video');
  v.pause();
  v.src = '';
  lb.classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Play tiles when visible; pause off-screen ones (saves bandwidth & battery)
const vio = new IntersectionObserver(entries => {
  entries.forEach(en => {
    const v = en.target.querySelector('video');
    if (!v) return;
    if (en.isIntersecting) v.play().catch(() => {});
    else v.pause();
  });
}, { threshold: 0.15 });
document.querySelectorAll('.tile').forEach(t => vio.observe(t));

// Some browsers block autoplay until the first interaction — retry then
['click', 'touchstart', 'scroll', 'keydown'].forEach(evt =>
  window.addEventListener(evt, () => {
    document.querySelectorAll('.tile video').forEach(v => {
      const r = v.getBoundingClientRect();
      if (r.bottom > 0 && r.top < window.innerHeight) v.play().catch(() => {});
    });
  }, { once: true, passive: true })
);
</script>
</body>
</html>
