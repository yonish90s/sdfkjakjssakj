<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מסוף תשלום מאובטח - Grow by Meshulam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0b0f19;
      --panel: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #0071e3;
      --text: #f5f5f7;
      --text-muted: #86868b;
    }
    body {
      margin: 0;
      padding: 24px;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .checkout-card {
      background: var(--panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }
    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-logo-glow {
      color: #10b981;
      text-shadow: 0 0 10px rgba(16,185,129,0.4);
    }
    .secure-badge {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #10b981;
      padding: 6px 12px;
      border-radius: 980px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .order-summary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      margin-top: 12px;
      padding-top: 12px;
      font-size: 1.15rem;
      font-weight: 800;
    }
    .api-status-box {
      background: rgba(250, 204, 21, 0.06);
      border: 1px solid rgba(250, 204, 21, 0.2);
      color: #facc15;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.8rem;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .btn-pay {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.25);
      transition: all 0.2s;
    }
    .btn-pay:hover {
      background: #059669;
      transform: translateY(-1px);
    }
    .btn-pay:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="checkout-card">
    <div class="brand-header">
      <div class="brand-title">
        <i class="fas fa-layer-group brand-logo-glow"></i>
        <span>Grow by Meshulam</span>
      </div>
      <div class="secure-badge">
        <i class="fas fa-shield-halved"></i>
        <span>חיבור מאובטח SSL</span>
      </div>
    </div>

    <!-- Active API Indicator -->
    <div class="api-status-box" id="api-indicator">
      <i class="fas fa-info-circle" style="margin-left: 6px;"></i>
      <span>מזהה API Key של Grow לא נמצא בניהול האתר. מריץ סימולציית תשלום מקומית.</span>
    </div>

    <div class="order-summary">
      <div id="items-list">
        <!-- Loaded dynamically -->
      </div>
      <div class="total-row">
        <span>סה"כ לתשלום:</span>
        <span id="total-amount">₪0</span>
      </div>
    </div>

    <form onsubmit="handlePayment(event)">
      <div class="form-group">
        <label for="card-holder">שם בעל הכרטיס</label>
        <input type="text" id="card-holder" required placeholder="ישראל ישראלי">
      </div>

      <div class="form-group">
        <label for="card-number">מספר כרטיס אשראי</label>
        <input type="text" id="card-number" required placeholder="4580 0000 0000 0000" maxlength="19" oninput="formatCardNumber(this)">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="card-expiry">תוקף</label>
          <input type="text" id="card-expiry" required placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
        </div>
        <div class="form-group">
          <label for="card-cvv">CVV</label>
          <input type="text" id="card-cvv" required placeholder="123" maxlength="3">
        </div>
      </div>

      <button type="submit" class="btn-pay">בצע תשלום מאובטח 💳</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amount = parseFloat(params.get('amount')) || 0;
    const itemsRaw = params.get('items');
    
    document.getElementById('total-amount').textContent = `₪${amount.toLocaleString()}`;

    if (itemsRaw) {
      try {
        const items = JSON.parse(decodeURIComponent(itemsRaw));
        const listContainer = document.getElementById('items-list');
        listContainer.innerHTML = items.map(item => `
          <div class="summary-row">
            <span style="color:#fafafa;">${item.text}</span>
          </div>
        `).join('');
      } catch(e) {}
    }

    // Display status of active Grow API key configuration
    const config = JSON.parse(localStorage.getItem('makeGrowConfig') || '{}');
    if (config.growKey) {
      document.getElementById('api-indicator').innerHTML = `
        <i class="fas fa-check-circle" style="color:#10b981; margin-left: 6px;"></i>
        <span style="color:#10b981;">מחובר בהצלחה עם ה-API Key שלך: <code>${config.growKey.substring(0, 10)}...</code></span>
      `;
      document.getElementById('api-indicator').style.background = 'rgba(16,185,129,0.06)';
      document.getElementById('api-indicator').style.borderColor = 'rgba(16,185,129,0.2)';
    }

    function formatCardNumber(input) {
      let v = input.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      let matches = v.match(/\d{4,16}/g);
      let match = matches && matches[0] || '';
      let parts = [];
      for (let i=0, len=match.length; i<len; i+=4) {
        parts.push(match.substring(i, i+4));
      }
      if (parts.length > 0) {
        input.value = parts.join(' ');
      } else {
        input.value = v;
      }
    }

    function formatExpiry(input) {
      let v = input.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      if (v.length >= 2) {
        input.value = v.substring(0, 2) + '/' + v.substring(2, 4);
      } else {
        input.value = v;
      }
    }

    function handlePayment(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-pay');
      btn.disabled = true;
      btn.textContent = 'מעבד תשלום מאובטח...';
      btn.style.background = '#86868b';

      setTimeout(() => {
        // Redirect to success page with simulated grow transaction ID
        const mockSessionId = 'grow_mock_' + Date.now();
        window.location.href = `/success.html?session_id=${mockSessionId}`;
      }, 1500);
    }
  </script>
</body>
</html>
